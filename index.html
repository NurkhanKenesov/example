<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart PE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --color-white-02: rgba(255, 255, 255, 0.00);
      --color-grey-98: #F5F7FF;
      --color-blue-10: #0F0F23;
      --Ebony: var(--color-blue-10, #0F0F23);
      --font-family-Font-2: Inter;
      --font-size-14: 14px;
      --font-weight-700: 700;
      --item-spacing-6: 6px;
      --font-size-13: 13px;
      --color-grey-97-3: #F0F2FF;
      --color-blue-69: #6C63FF;
      --color-violet-66: #8B5CF6;
      --Black: var(--color-black-solid, #000);
      --font-size-48: 48px;
      --font-weight-400: 400;
      --font-size-36: 36px;
      --font-weight-900: 900;
      --line-height-39_6: 39.6px;
      --color-blue-1050: rgba(15, 15, 35, 0.50);
      --font-size-15: 15px;
      --line-height-22_5: 22.5px;
      --stroke-weight-1: 1px;
      --color-blue-6925: rgba(108, 99, 255, 0.25);
      --color-blue-6912: rgba(108, 99, 255, 0.12);
      --Heliotrope: var(--color-violet-76, #A78BFA);
      --font-weight-600: 600;
      --color-spring-green-5825: rgba(74, 222, 128, 0.25);
      --color-spring-green-5812: rgba(74, 222, 128, 0.12);
      --Shamrock: var(--color-spring-green-58, #4ADE80);
      --color-orange-5625: rgba(251, 191, 36, 0.25);
      --color-orange-5612: rgba(251, 191, 36, 0.12);
      --Lightning-Yellow: var(--color-orange-56, #FBBF24);
      --item-spacing-12: 12px;
      --White: var(--color-white-solid, #FFF);
      --font-size-16: 16px;
      --color-blue-6930: rgba(108, 99, 255, 0.30);
      --color-blue-6915: rgba(108, 99, 255, 0.15);
      --Cornflower-Blue: var(--color-blue-69, #6C63FF);
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Inter, -apple-system, Roboto, Helvetica, sans-serif;
      background: #e8eaf6;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .iphone-container {
      display: flex;
      width: 393px;
      height: 852px;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      border-radius: 48px;
      background: rgba(255, 255, 255, 0.00);
      box-shadow: 0 20px 60px 0 rgba(108, 99, 255, 0.15), 0 4px 20px 0 rgba(0, 0, 0, 0.08);
      position: relative;
    }

    .iphone {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      flex: 1 0 0;
      align-self: stretch;
      border-radius: 48px;
      background: #F5F7FF;
      overflow: hidden;
      position: relative;
    }

    .dynamic-island {
      width: 126px;
      height: 36px;
      position: relative;
      left: 133.5px;
      top: 12px;
      border-radius: 20px;
      background: #0F0F23;
    }

    .status-bar {
      display: flex;
      padding: 16px 28px 8px;
      justify-content: space-between;
      align-items: center;
      align-self: stretch;
      position: relative;
    }

    .status-time {
      color: var(--color-blue-10, #0F0F23);
      font-size: 14px;
      font-weight: 700;
      line-height: normal;
    }

    .status-icons {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .status-icon {
      color: var(--color-blue-10, #0F0F23);
      font-size: 13px;
      font-weight: 700;
      line-height: normal;
    }

    .screen {
      display: flex;
      height: 808px;
      flex-direction: column;
      align-items: flex-start;
      align-self: stretch;
      background: linear-gradient(180deg, #F0F2FF 0%, #F5F7FF 100%);
      overflow: hidden;
      position: relative;
    }

    .hero {
      display: flex;
      padding: 0 32px;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      flex: 1 0 0;
      align-self: stretch;
      position: relative;
    }

    .logo-wrapper {
      display: flex;
      width: 100px;
      height: 128px;
      padding-bottom: 28px;
      flex-direction: column;
      align-items: flex-start;
    }

    .logo {
      display: flex;
      width: 100px;
      height: 100px;
      justify-content: center;
      align-items: center;
      flex-shrink: 0;
      border-radius: 28px;
      background: linear-gradient(135deg, #6C63FF 0%, #8B5CF6 100%);
      box-shadow: 0 12px 40px 0 rgba(108, 99, 255, 0.35);
    }

    .logo-emoji {
      font-size: 48px;
      text-align: center;
      line-height: normal;
    }

    .app-name-wrapper {
      display: flex;
      padding-bottom: 8px;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    .app-name {
      color: var(--color-blue-10, #0F0F23);
      text-align: center;
      font-size: 36px;
      font-weight: 900;
      line-height: 39.6px;
    }

    .app-tagline-wrapper {
      display: flex;
      padding-bottom: 36px;
      justify-content: center;
      align-items: center;
    }

    .app-tagline {
      color: rgba(15, 15, 35, 0.50);
      text-align: center;
      font-size: 15px;
      font-weight: 400;
      line-height: 22.5px;
      width: 226px;
    }

    .feature-pills-wrapper {
      display: flex;
      padding-bottom: 40px;
      flex-direction: column;
      align-items: flex-start;
    }

    .feature-pills {
      width: 329px;
      height: 76px;
      position: relative;
    }

    .pill {
      display: inline-flex;
      height: 34px;
      padding: 8px 16px;
      flex-direction: column;
      align-items: center;
      border-radius: 20px;
      position: absolute;
      font-size: 13px;
      font-weight: 600;
      line-height: normal;
    }

    .pill-ai-plans {
      border: 1px solid rgba(108, 99, 255, 0.25);
      background: rgba(108, 99, 255, 0.12);
      left: 54px;
      top: 0;
      width: 117px;
      color: var(--color-violet-76, #A78BFA);
    }

    .pill-tracking {
      border: 1px solid rgba(74, 222, 128, 0.25);
      background: rgba(74, 222, 128, 0.12);
      left: 176px;
      top: 0;
      width: 103px;
      color: var(--color-spring-green-58, #4ADE80);
    }

    .pill-analytics {
      border: 1px solid rgba(251, 191, 36, 0.25);
      background: rgba(251, 191, 36, 0.12);
      left: 106px;
      top: 42px;
      width: 120px;
      color: var(--color-orange-56, #FBBF24);
    }

    .bottom-actions {
      display: flex;
      padding: 0 24px 60px;
      flex-direction: column;
      align-items: flex-start;
      gap: 12px;
      align-self: stretch;
    }

    .btn-primary {
      display: flex;
      padding: 16px 24px;
      flex-direction: column;
      align-items: center;
      align-self: stretch;
      border-radius: 14px;
      background: linear-gradient(99deg, #6C63FF 0%, #8B5CF6 100%);
      border: none;
      cursor: pointer;
    }

    .btn-primary-label {
      color: var(--color-white-solid, #FFF);
      text-align: center;
      font-size: 16px;
      font-weight: 700;
      line-height: normal;
    }

    .btn-secondary {
      display: flex;
      padding: 14px 24px;
      flex-direction: column;
      align-items: center;
      align-self: stretch;
      border-radius: 14px;
      border: 1px solid rgba(108, 99, 255, 0.30);
      background: rgba(108, 99, 255, 0.15);
      cursor: pointer;
    }

    .btn-secondary-label {
      color: var(--color-blue-69, #6C63FF);
      text-align: center;
      font-size: 15px;
      font-weight: 600;
      line-height: normal;
    }

    /* ── Mobile: fill the real viewport, hide device chrome ── */
    @media (max-width: 480px) {
      body {
        background: linear-gradient(180deg, #F0F2FF 0%, #F5F7FF 100%);
        align-items: stretch;
        min-height: 100dvh;
      }

      .iphone-container {
        width: 100%;
        height: 100%;
        border-radius: 0;
        box-shadow: none;
        flex: 1;
      }

      .iphone {
        border-radius: 0;
        background: transparent;
      }

      .dynamic-island,
      .status-bar {
        display: none;
      }

      .screen {
        height: 100dvh;
        background: none;
      }

      .hero {
        padding: 0 24px;
      }

      .app-tagline {
        width: auto;
        max-width: 260px;
      }

      .feature-pills {
        width: 100%;
        max-width: 329px;
      }

      .bottom-actions {
        padding: 0 20px 40px;
      }
    }

    /* ── Small desktop / tablet: scale frame to fit ── */
    @media (min-width: 481px) and (max-width: 860px) {
      body {
        padding: 24px 0;
        align-items: flex-start;
      }

      .iphone-container {
        transform-origin: top center;
        transform: scale(0.85);
        margin: 0 auto;
      }
    }
  </style>
</head>
<body>
  <div class="iphone-container">
    <div class="iphone">
      <div class="dynamic-island"></div>

      <div class="status-bar">
        <span class="status-time">9:41</span>
        <div class="status-icons">
          <span class="status-icon">📶</span>
          <span class="status-icon">📡</span>
          <span class="status-icon">🔋</span>
        </div>
      </div>

      <div class="screen">
        <div class="hero">
          <div class="logo-wrapper">
            <div class="logo">
              <span class="logo-emoji">🏋️</span>
            </div>
          </div>

          <div class="app-name-wrapper">
            <span class="app-name">Smart PE</span>
          </div>

          <div class="app-tagline-wrapper">
            <p class="app-tagline">Персональный ИИ-тренер для студентов университета</p>
          </div>

          <div class="feature-pills-wrapper">
            <div class="feature-pills">
              <div class="pill pill-ai-plans">🤖 ИИ-планы</div>
              <div class="pill pill-tracking">💪 Трекинг</div>
              <div class="pill pill-analytics">📊 Аналитика</div>
            </div>
          </div>
        </div>

        <div class="bottom-actions">
          <button class="btn-primary">
            <span class="btn-primary-label">Войти</span>
          </button>
          <button class="btn-secondary">
            <span class="btn-secondary-label">Создать аккаунт</span>
          </button>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
